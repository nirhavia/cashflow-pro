name: Build CashFlow Pro
on:
  push:
    branches: [main]
    paths-ignore:
      - 'index.html'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: node build.js
      - run: |
          git config user.email "actions@github.com"
          git config user.name  "github-actions"
          git add index.html
          git diff --staged --quiet || git commit -m "Build: compile JSX"
          git push
