<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CashFlow Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d14;--s1:#0f1622;--s2:#141e2e;--bd:#1e2d42;--bd2:#263650;
  --gold:#d4a853;--gold2:#e8c077;--glow:rgba(212,168,83,.15);
  --tx:#c8ddf0;--mu:#4e6a8a;--mu2:#6b87a8;
  --ok:#26b887;--err:#e05454;--warn:#d4a030;--inf:#4d96e8;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'Heebo',sans-serif;direction:rtl;color:var(--tx);font-size:14px}
.mono{font-family:'JetBrains Mono',monospace}
input,select,textarea{background:var(--s1);color:var(--tx);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;font-family:'Heebo',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--gold)}
button{cursor:pointer;border:none;border-radius:9px;padding:7px 15px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;transition:all .15s}
.bp{background:var(--gold);color:#080d14}.bp:hover{background:var(--gold2)}
.bg{background:transparent;color:var(--tx);border:1px solid var(--bd)}.bg:hover{border-color:var(--gold);color:var(--gold)}
.bd{background:transparent;color:var(--err);border:1px solid rgba(224,84,84,.3)}.bd:hover{background:var(--err);color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:8px 13px;color:var(--mu2);font-size:11px;font-weight:600;letter-spacing:.5px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 13px;border-bottom:1px solid rgba(30,45,66,.6);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,168,83,.03)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:13px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.t-check{background:rgba(77,150,232,.15);color:var(--inf)}
.t-invoice{background:rgba(212,160,48,.15);color:var(--warn)}
.t-income{background:rgba(38,184,135,.15);color:var(--ok)}
.t-fixed{background:rgba(224,84,84,.15);color:var(--err)}
label{font-size:12px;color:var(--mu2);display:block;margin-bottom:4px;font-weight:500}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
/* Layout */
#app{display:flex;height:100vh}
#sidebar{width:215px;background:#05090f;border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
#sidebar-logo{padding:18px 15px 15px;border-bottom:1px solid var(--bd)}
#sidebar-logo .sub{font-size:9px;color:var(--mu);letter-spacing:3px;margin-bottom:3px}
#sidebar-logo .name{font-size:18px;font-weight:900;color:var(--gold)}
#sidebar-nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px}
.nav-btn{background:transparent;color:var(--mu2);border:none;border-radius:8px;padding:8px 11px;text-align:right;font-size:13px;font-weight:400;display:flex;align-items:center;gap:8px;cursor:pointer;border-right:2px solid transparent;transition:all .15s;width:100%}
.nav-btn.active{background:var(--glow);color:var(--gold);font-weight:700;border-right-color:var(--gold)}
.nav-btn:hover:not(.active){color:var(--tx)}
#sidebar-footer{padding:10px 10px 14px;display:flex;flex-direction:column;gap:7px}
.alert-box{padding:8px 11px;background:rgba(224,84,84,.07);border:1px solid rgba(224,84,84,.2);border-radius:8px;font-size:11px;color:var(--err);font-weight:700}
.balance-box{padding:8px 11px;background:var(--glow);border:1px solid rgba(212,168,83,.15);border-radius:8px}
.balance-box .lbl{font-size:10px;color:var(--mu);margin-bottom:2px}
.balance-box .val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700}
#main{flex:1;overflow:auto;padding:24px 28px}
/* Pages */
.page{display:none}
.page.active{display:block}
h1{font-size:21px;font-weight:800;margin-bottom:3px}
.sub-title{color:var(--mu2);font-size:13px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.kpi{padding:16px 18px}
.kpi .icon{font-size:22px;margin-bottom:8px}
.kpi .val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;margin-bottom:4px}
.kpi .lbl{font-size:12px;color:var(--mu2)}
.kpi .note{font-size:10px;color:rgba(212,168,83,.4);margin-top:3px}
.kpi:hover{border-color:var(--gold)}
/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:var(--s1);border:1px solid var(--bd);border-radius:14px;width:440px;padding:26px;box-shadow:0 24px 64px rgba(0,0,0,.6);max-height:90vh;overflow:auto}
#modal-title{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
/* Chart containers */
.chart-wrap{position:relative;height:230px}
.chart-wrap-lg{position:relative;height:320px}
/* Drag-drop */
.drop-zone{border:2px dashed var(--bd2);border-radius:11px;padding:32px 20px;text-align:center;transition:border-color .2s;cursor:pointer}
.drop-zone:hover,.drop-zone.drag{border-color:var(--gold)}
.drop-zone .dz-icon{font-size:30px;margin-bottom:8px}
.drop-zone .dz-title{font-size:14px;font-weight:600;margin-bottom:5px}
.drop-zone .dz-sub{font-size:12px;color:var(--mu2);margin-bottom:12px}
/* Misc */
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.spacer{height:16px}
.section-title{font-size:14px;font-weight:700;padding:12px 16px;border-bottom:1px solid var(--bd)}
.empty{text-align:center;color:var(--mu2);padding:48px;font-size:14px}
.success-msg{background:rgba(38,184,135,.07);border:1px solid rgba(38,184,135,.25);border-radius:9px;padding:11px 16px;color:var(--ok);font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div id="app">
  <!-- Sidebar -->
  <nav id="sidebar">
    <div id="sidebar-logo">
      <div class="sub">ניהול תזרים מזומנים</div>
      <div class="name">CashFlow Pro</div>
    </div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer">
      <div id="alert-area"></div>
      <div class="balance-box">
        <div class="lbl">יתרה נוכחית</div>
        <div class="val mono" id="sidebar-balance"></div>
      </div>
    </div>
  </nav>
  <!-- Main -->
  <main id="main">
    <div id="page-dashboard" class="page"></div>
    <div id="page-forecast"  class="page"></div>
    <div id="page-suppliers" class="page"></div>
    <div id="page-ledger"    class="page"></div>
    <div id="page-aging"     class="page"></div>
    <div id="page-import"    class="page"></div>
    <div id="page-recurring" class="page"></div>
  </main>
</div>
<!-- Modal -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title"><span id="modal-title-text"></span><button class="bg" style="padding:3px 9px;font-size:15px" onclick="closeModal()">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════════════════════
const S = {
  suppliers:    JSON.parse(localStorage.getItem('cf-sup')  || '[]'),
  checks:       JSON.parse(localStorage.getItem('cf-chk')  || '[]'),
  invoices:     JSON.parse(localStorage.getItem('cf-inv')  || '[]'),
  fixedItems:   JSON.parse(localStorage.getItem('cf-fix')  || '[]'),
  openingBal:   parseFloat(localStorage.getItem('cf-ob')   || '0'),
  activeTab:    'dashboard',
};
const save = () => {
  localStorage.setItem('cf-sup', JSON.stringify(S.suppliers));
  localStorage.setItem('cf-chk', JSON.stringify(S.checks));
  localStorage.setItem('cf-inv', JSON.stringify(S.invoices));
  localStorage.setItem('cf-fix', JSON.stringify(S.fixedItems));
  localStorage.setItem('cf-ob',  S.openingBal);
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,5);

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
const fmt = n => new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
const fmtD = d => d ? new Date(d).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
const toISO = d => { if(!d) return ''; const dt = d instanceof Date ? d : new Date(d); return isNaN(dt)?'':dt.toISOString().split('T')[0]; };
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const eom = d => { const dt=new Date(d); return new Date(dt.getFullYear(),dt.getMonth()+1,0); };
const xlDate = v => { if(!v) return ''; if(v instanceof Date) return toISO(v); if(typeof v==='number') return toISO(new Date(Math.round((v-25569)*86400000))); return toISO(new Date(v)); };
const typeLabel = t => ({check:'המחאה',invoice:'חשבונית',income:'הכנסה',fixed:'הוצאה קבועה'}[t]||t);
const h = (tag, attrs={}, ...children) => {
  const el = document.createElement(tag);
  for(const [k,v] of Object.entries(attrs)){
    if(k==='class') el.className=v;
    else if(k.startsWith('on')) el.addEventListener(k.slice(2),v);
    else el.setAttribute(k,v);
  }
  children.flat().forEach(c => { if(c==null) return; el.append(typeof c==='string'||typeof c==='number' ? document.createTextNode(String(c)) : c); });
  return el;
};
const el = id => document.getElementById(id);

// ═══════════════════════════════════════════════════════════════
// FORECAST ENGINE
// ═══════════════════════════════════════════════════════════════
function buildForecast() {
  const today = new Date(); today.setHours(0,0,0,0);
  const DAYS = 120;
  const events = [];

  S.checks.forEach(c => {
    if(!c.date) return;
    const d = new Date(c.date); d.setHours(0,0,0,0);
    if(d >= today) events.push({date:toISO(d), amount:-Math.abs(c.amount||0), type:'check', label:c.supplierName||'המחאה'});
  });

  S.invoices.forEach(inv => {
    if(!inv.date) return;
    const sup = S.suppliers.find(s=>s.id===inv.supplierId||s.name===inv.supplierName);
    const terms = sup?(sup.paymentTerms||30):30;
    const pay = addDays(eom(new Date(inv.date)), terms);
    if(pay >= today) events.push({date:toISO(pay), amount:-Math.abs(inv.amount||0), type:'invoice', label:inv.supplierName||'חשבונית'});
  });

  for(let i=0;i<DAYS;i++){
    const d = addDays(today,i);
    S.fixedItems.forEach(fi=>{
      const sign = fi.type==='income' ? 1 : -1;
      if(fi.recurrence==='monthly' && d.getDate()===(fi.dayOfMonth||1))
        events.push({date:toISO(d), amount:sign*Math.abs(fi.amount||0), type:fi.type==='income'?'income':'fixed', label:fi.name});
      else if(fi.recurrence==='once' && toISO(d)===fi.date)
        events.push({date:toISO(d), amount:sign*Math.abs(fi.amount||0), type:fi.type==='income'?'income':'fixed', label:fi.name});
    });
  }

  events.sort((a,b)=>a.date.localeCompare(b.date));

  let bal = S.openingBal;
  const chartData = [];
  for(let i=0;i<DAYS;i++){
    const d = addDays(today,i);
    const key = toISO(d);
    events.filter(e=>e.date===key).forEach(e=>{ bal+=e.amount; });
    chartData.push({date:key, balance:Math.round(bal), label:d.toLocaleDateString('he-IL',{day:'numeric',month:'short'})});
  }

  const negDays = chartData.filter(c=>c.balance<0).map(c=>c.date);
  const minBal = chartData.length ? Math.min(...chartData.map(c=>c.balance)) : 0;
  return {events, chartData, negDays, minBal};
}

// ═══════════════════════════════════════════════════════════════
// SIDEBAR & NAVIGATION
// ═══════════════════════════════════════════════════════════════
const TABS = [
  {id:'dashboard',icon:'📊',label:'דשבורד'},
  {id:'forecast', icon:'📅',label:'תזרים עתידי'},
  {id:'suppliers',icon:'🏢',label:'ספקים'},
  {id:'ledger',   icon:'📒',label:'כרטסת ספק'},
  {id:'aging',    icon:'⏱', label:'גיול חשבוניות'},
  {id:'import',   icon:'📥',label:'יבוא נתונים'},
  {id:'recurring',icon:'🔄',label:'קבועות'},
];

function renderSidebar() {
  const nav = el('sidebar-nav');
  nav.innerHTML = '';
  TABS.forEach(t => {
    const btn = h('button', {class:'nav-btn'+(S.activeTab===t.id?' active':''), onclick:()=>navigate(t.id)});
    btn.innerHTML = `<span style="font-size:15px">${t.icon}</span>${t.label}`;
    nav.appendChild(btn);
  });
  const fc = buildForecast();
  const alertArea = el('alert-area');
  alertArea.innerHTML = '';
  if(fc.negDays.length>0){
    alertArea.innerHTML = `<div class="alert-box">⚠ ${fc.negDays.length} ימי חוסר צפויים</div>`;
  }
  const balEl = el('sidebar-balance');
  balEl.textContent = fmt(S.openingBal);
  balEl.style.color = S.openingBal >= 0 ? 'var(--ok)' : 'var(--err)';
}

function navigate(tabId) {
  S.activeTab = tabId;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  el('page-'+tabId).classList.add('active');
  renderSidebar();
  renders[tabId]();
}

// ═══════════════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════════════
function openModal(title, bodyHTML) {
  el('modal-title-text').textContent = title;
  el('modal-body').innerHTML = bodyHTML;
  el('modal-overlay').classList.add('open');
}
function closeModal() { el('modal-overlay').classList.remove('open'); }
el('modal-overlay').addEventListener('click', e => { if(e.target===el('modal-overlay')) closeModal(); });

// ═══════════════════════════════════════════════════════════════
// CHART INSTANCES
// ═══════════════════════════════════════════════════════════════
const charts = {};
function destroyChart(id) { if(charts[id]){charts[id].destroy();delete charts[id];} }

// ═══════════════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════════════
function renderDashboard() {
  const pg = el('page-dashboard');
  const fc = buildForecast();
  const totalChk = S.checks.reduce((s,c)=>s+(c.amount||0),0);
  const totalInv = S.invoices.reduce((s,i)=>s+(i.amount||0),0);

  pg.innerHTML = `
    <h1>דשבורד</h1><div class="sub-title">סקירה כללית ותחזית תזרים</div>
    <div class="g3" style="margin-bottom:18px">
      <div class="card kpi" id="kpi-bal" style="cursor:pointer" title="לחץ לעדכון">
        <div class="icon">💰</div>
        <div class="val" style="color:${S.openingBal>=0?'var(--ok)':'var(--err)'}">${fmt(S.openingBal)}</div>
        <div class="lbl">יתרה נוכחית</div><div class="note">לחץ לעדכון</div>
      </div>
      <div class="card kpi"><div class="icon">🧾</div><div class="val" style="color:var(--warn)">${fmt(totalInv)}</div><div class="lbl">סה"כ חשבוניות</div></div>
      <div class="card kpi"><div class="icon">📄</div><div class="val" style="color:var(--inf)">${fmt(totalChk)}</div><div class="lbl">סה"כ המחאות</div></div>
      <div class="card kpi"><div class="icon">⏳</div><div class="val" style="color:var(--err)">${fmt(Math.max(0,totalInv-totalChk))}</div><div class="lbl">יתרה לתשלום</div></div>
      <div class="card kpi"><div class="icon">${fc.minBal<0?'⚠':'✅'}</div><div class="val" style="color:${fc.minBal<0?'var(--err)':'var(--ok)'}">${fmt(fc.minBal)}</div><div class="lbl">מינימום תחזית 120 יום</div></div>
      <div class="card kpi"><div class="icon">🏢</div><div class="val" style="color:var(--mu2)">${S.suppliers.length}</div><div class="lbl">ספקים פעילים</div></div>
    </div>
    <div class="card" style="padding:20px 22px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <span style="font-size:14px;font-weight:700">תחזית תזרים — 120 ימים קדימה</span>
        ${fc.negDays.length>0?`<span class="tag t-fixed">⚠ ${fc.negDays.length} ימי חוסר</span>`:''}
      </div>
      <div class="chart-wrap"><canvas id="chart-forecast-dash"></canvas></div>
    </div>
    ${buildMonthlyBarHTML()}
    ${fc.negDays.length>0?`
    <div style="background:rgba(224,84,84,.04);border:1px solid rgba(224,84,84,.18);border-radius:11px;padding:18px">
      <div style="color:var(--err);font-size:13px;font-weight:700;margin-bottom:10px">⚠ ימים עם יתרה שלילית</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px">${fc.negDays.slice(0,18).map(d=>`<span style="background:rgba(224,84,84,.1);color:var(--err);padding:2px 9px;border-radius:999px;font-size:12px">${fmtD(d)}</span>`).join('')}${fc.negDays.length>18?`<span style="color:var(--mu2);font-size:12px">+${fc.negDays.length-18} נוספים</span>`:''}</div>
    </div>`:''}
  `;

  el('kpi-bal').addEventListener('click', () => {
    openModal('עדכון יתרת בנק', `
      <label>יתרה נוכחית (₪)</label>
      <input type="number" id="bal-input" value="${S.openingBal}" style="margin-bottom:14px">
      <div style="display:flex;gap:8px">
        <button class="bp" onclick="S.openingBal=parseFloat(document.getElementById('bal-input').value)||0;save();closeModal();navigate('dashboard')">שמור</button>
        <button class="bg" onclick="closeModal()">ביטול</button>
      </div>
    `);
  });

  destroyChart('forecast-dash');
  const ctx = el('chart-forecast-dash').getContext('2d');
  const every = Math.ceil(fc.chartData.length/12);
  charts['forecast-dash'] = new Chart(ctx, {
    type:'line',
    data:{
      labels: fc.chartData.map((d,i)=>i%every===0?d.label:''),
      datasets:[{
        data: fc.chartData.map(d=>d.balance),
        borderColor:'#d4a853',borderWidth:2,pointRadius:0,
        fill:true,backgroundColor:'rgba(212,168,83,.12)',tension:.4
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.raw)}}},
      scales:{
        x:{grid:{color:'#172030'},ticks:{color:'#4e6a8a',font:{size:10}}},
        y:{grid:{color:'#172030'},ticks:{color:'#4e6a8a',font:{size:10},callback:v=>`₪${(Math.abs(v)/1000).toFixed(0)}K`}}
      }
    }
  });

  // monthly bars
  renderMonthlyBar();
}

function buildMonthlyBarHTML() {
  const now = new Date();
  const hasData = S.invoices.length>0||S.checks.length>0;
  if(!hasData) return '';
  return `
    <div class="card" style="padding:20px 22px;margin-bottom:16px">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px">חשבוניות מול תשלומים — 6 חודשים אחרונים</div>
      <div style="height:170px"><canvas id="chart-monthly"></canvas></div>
      <div style="display:flex;gap:16px;justify-content:center;margin-top:10px">
        <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu2)"><div style="width:10px;height:10px;border-radius:2px;background:#d4a030"></div>חשבוניות</div>
        <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu2)"><div style="width:10px;height:10px;border-radius:2px;background:#4d96e8"></div>המחאות</div>
      </div>
    </div>`;
}

function renderMonthlyBar() {
  if(!el('chart-monthly')) return;
  const now = new Date();
  const months = Array.from({length:6},(_,i)=>{
    const d = new Date(now.getFullYear(),now.getMonth()-5+i,1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return {key, label:d.toLocaleDateString('he-IL',{month:'short',year:'2-digit'})};
  });
  destroyChart('monthly');
  const ctx = el('chart-monthly').getContext('2d');
  charts['monthly'] = new Chart(ctx, {
    type:'bar',
    data:{
      labels:months.map(m=>m.label),
      datasets:[

        <div><label>טלפון</label><input id="sf-phone" placeholder="050-0000000"></div>

function saveSup(){
  const name=el('sf-name').value.trim();
  if(!name) return;
  const obj={name,paymentTerms:parseInt(el('sf-terms').value)||30,paymentMethod:el('sf-method').value,phone:el('sf-phone').value,notes:el('sf-notes').value};
  if(supEditId){S.suppliers=S.suppliers.map(x=>x.id===supEditId?{...x,...obj}:x);supEditId=null;}
  else S.suppliers.push({...obj,id:uid()});
  save();renderSuppliers();renderSidebar();
}
function editSup(id){
  supEditId=id;
  renderSuppliers();
  const s=S.suppliers.find(x=>x.id===id);
  if(!s) return;
  el('sf-name').value=s.name||'';
  el('sf-terms').value=String(s.paymentTerms||30);
  el('sf-method').value=s.paymentMethod||'המחאה';
  el('sf-phone').value=s.phone||'';
  el('sf-notes').value=s.notes||'';
}
function delSup(id){if(confirm('למחוק ספק זה?')){S.suppliers=S.suppliers.filter(x=>x.id!==id);save();renderSuppliers();renderSidebar();}}
function goLedger(id){S._ledgerSup=id;navigate('ledger');}

let chkEditId=null;

  chkEditId=editId||null;

      <div><label>סכום (₪) *</label><input type="number" id="chk-amount" placeholder="0" value="${c?c.amount:''}"></div>
      <div><label>מס׳ המחאה</label><input id="chk-num" placeholder="מספר המחאה" value="${c?c.checkNumber||'':''}"></div>

    </div>
  `);
}
function saveManualCheck(){
  const supId=el('chk-sup').value;
  const sup=S.suppliers.find(s=>s.id===supId);
  const date=el('chk-date').value;
  const amount=parseFloat(el('chk-amount').value)||0;
  const checkNumber=el('chk-num').value.trim();
  if(!sup||!date||!amount){alert('יש למלא ספק, תאריך וסכום');return;}
  if(chkEditId){
    S.checks=S.checks.map(x=>x.id===chkEditId?{...x,supplierName:sup.name,supplierId:sup.id,date,amount,checkNumber}:x);
  } else {
    S.checks.push({id:uid(),supplierName:sup.name,supplierId:sup.id,date,amount,checkNumber});
  }
  save();closeModal();
  navigate(S.activeTab);
}
function editCheck(id){openAddCheck(id);}
function delCheck(id){if(confirm('למחוק המחאה זו?')){S.checks=S.checks.filter(x=>x.id!==id);save();renderLedger();renderSidebar();}}

function renderLedger(){

  const sid = S._ledgerSup || (S.suppliers[0]?.id||'');

  if(!sup){
    pg.innerHTML=`<h1>כרטסת ספק</h1><div class="sub-title">חשבוניות והמחאות לפי ספק</div>
      <select style="max-width:240px;margin-bottom:20px" onchange="S._ledgerSup=this.value;renderLedger()">
        <option value="">— בחר ספק —</option>
        ${S.suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
      </select>
      <div class="empty" style="padding:80px">בחר ספק לצפייה בכרטסת</div>`;
    return;
  }

  const sInv = [...S.invoices.filter(i=>i.supplierId===sup.id||i.supplierName===sup.name)];
  const sChk = [...S.checks.filter(c=>c.supplierId===sup.id||c.supplierName===sup.name)];
  const tInv=sInv.reduce((s,i)=>s+(i.amount||0),0);
  const tChk=sChk.reduce((s,c)=>s+(c.amount||0),0);

  // Merge + sort by date for combined ledger
  const allRows = [
    ...sInv.map(i=>({...i,rowType:'invoice',sortDate:i.date||''})),
    ...sChk.map(c=>({...c,rowType:'check',sortDate:c.date||''}))
  ].sort((a,b)=>a.sortDate.localeCompare(b.sortDate));

  let running=0;

  pg.innerHTML=`
    <h1>כרטסת ספק</h1>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap">
      <select style="max-width:220px" onchange="S._ledgerSup=this.value;renderLedger()">
        <option value="">— בחר ספק —</option>
        ${S.suppliers.map(s=>`<option value="${s.id}"${s.id===sid?' selected':''}>${s.name}</option>`).join('')}
      </select>
      <button class="bp" style="font-size:12px;padding:6px 12px" onclick="openAddCheck()">+ הוסף המחאה</button>
      <button class="bg" style="font-size:12px;padding:6px 12px" onclick="printLedger()">🖨 הדפסה</button>
    </div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:18px">
      ${[['חשבוניות',fmt(tInv),'var(--warn)'],['שולם',fmt(tChk),'var(--ok)'],['יתרה לתשלום',fmt(tInv-tChk),(tInv-tChk)>0?'var(--err)':'var(--ok)'],['תנאי תשלום',`שוטף+${sup.paymentTerms||30}`,'var(--mu2)']].map(([l,v,c])=>`<div style="text-align:center"><div style="font-size:11px;color:var(--mu2);margin-bottom:2px">${l}</div><div class="mono" style="font-size:13px;font-weight:700;color:${c}">${v}</div></div>`).join('')}
    </div>
    <div class="card" style="overflow:hidden" id="ledger-table-wrap">
      <table>
        <thead><tr><th>תאריך</th><th>סוג</th><th>מס׳ מסמך</th><th>חובה (חשבונית)</th><th>זכות (המחאה)</th><th>יתרה</th><th>פעולות</th></tr></thead>
        <tbody>
          ${allRows.map(r=>{
            const isInv = r.rowType==='invoice';
            if(isInv) running+=(r.amount||0);
            else running-=(r.amount||0);
            const pay = isInv ? addDays(eom(new Date(r.date)),sup.paymentTerms||30) : null;
            const late = pay && pay<today;
            return `<tr>
              <td style="font-size:12px;color:var(--mu2);white-space:nowrap">${fmtD(r.sortDate)}</td>
              <td><span class="tag ${isInv?'t-invoice':'t-check'}">${isInv?'חשבונית':'המחאה'}</span></td>
              <td style="font-size:12px">${isInv?(r.invoiceNumber||'—'):(r.checkNumber||'—')}${isInv&&pay?`<div style="font-size:10px;color:${late?'var(--err)':'var(--mu2)'}">לתשלום: ${fmtD(pay)}${late?' ⚠':''}</div>`:''}</td>
              <td class="mono" style="color:var(--warn);font-weight:${isInv?700:400}">${isInv?fmt(r.amount):'—'}</td>
              <td class="mono" style="color:var(--ok);font-weight:${!isInv?700:400}">${!isInv?fmt(r.amount):'—'}</td>
              <td class="mono" style="font-weight:700;color:${running>0?'var(--err)':'var(--ok)'}">${fmt(running)}</td>
              <td>${!isInv?`<div style="display:flex;gap:4px">
                <button class="bg" style="padding:2px 7px;font-size:11px" onclick="editCheck('${r.id}')">עריכה</button>
                <button class="bd" style="padding:2px 7px;font-size:11px" onclick="delCheck('${r.id}')">מחק</button>

            </tr>`;
          }).join('')}
          ${allRows.length===0?'<tr><td colspan="7" class="empty">אין נתונים לספק זה</td></tr>':''}
        </tbody>
      </table>
    </div>
  `;
}

// AGING
// ═══════════════════════════════════════════════════════════════
let agingSup='all';
function renderAging(){
  const pg=el('page-aging');
  const today=new Date(); today.setHours(0,0,0,0);
  const bc={'0-30':'var(--ok)','31-60':'var(--warn)','61-90':'var(--err)','90+':'#b91c1c'};
  const blabels={'0-30':'עד 30 יום','31-60':'31–60 יום','61-90':'61–90 יום','90+':'מעל 90 יום'};

  // Summary rows (all suppliers)
  const summaryRows=S.suppliers.map(sup=>{
    const sInv=S.invoices.filter(i=>i.supplierId===sup.id||i.supplierName===sup.name);
    let pool=S.checks.filter(c=>c.supplierId===sup.id||c.supplierName===sup.name).reduce((s,c)=>s+(c.amount||0),0);
    const bkts={'0-30':0,'31-60':0,'61-90':0,'90+':0};
    [...sInv].sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(inv=>{
      const age=Math.floor((today-new Date(inv.date))/86400000);
      const amt=inv.amount||0,cov=Math.min(pool,amt);pool-=cov;const open=amt-cov;
      if(open<=0)return;
      if(age<=30)bkts['0-30']+=open;else if(age<=60)bkts['31-60']+=open;else if(age<=90)bkts['61-90']+=open;else bkts['90+']+=open;
    });
    return{sup,bkts,total:Object.values(bkts).reduce((s,v)=>s+v,0)};
  }).filter(r=>r.total>0);

  const totals={'0-30':0,'31-60':0,'61-90':0,'90+':0,all:0};
  summaryRows.forEach(r=>{Object.keys(r.bkts).forEach(k=>{totals[k]+=r.bkts[k];});totals.all+=r.total;});

  // Combined ledger for selected supplier
  const selSup = agingSup!=='all' ? S.suppliers.find(s=>s.id===agingSup) : null;
  let ledgerHtml='';
  if(selSup){
    const sInv=[...S.invoices.filter(i=>i.supplierId===selSup.id||i.supplierName===selSup.name)];
    const sChk=[...S.checks.filter(c=>c.supplierId===selSup.id||c.supplierName===selSup.name)];
    const allRows=[
      ...sInv.map(i=>({...i,rowType:'invoice',sortDate:i.date||''})),
      ...sChk.map(c=>({...c,rowType:'check',sortDate:c.date||''}))
    ].sort((a,b)=>a.sortDate.localeCompare(b.sortDate));
    let running=0;
    ledgerHtml=`
      <div class="card" style="overflow:hidden;margin-bottom:16px" id="aging-ledger-wrap">
        <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>📒 כרטסת: ${selSup.name}</span>
          <button class="bg" style="font-size:12px;padding:5px 12px" onclick="printAgingLedger()">🖨 הדפסה</button>
        </div>
        <table>
          <thead><tr><th>תאריך</th><th>סוג</th><th>מס׳ מסמך</th><th>חובה (חשבונית)</th><th>זכות (המחאה)</th><th>יתרה</th></tr></thead>
          <tbody>
            ${allRows.map(r=>{
              const isInv=r.rowType==='invoice';
              if(isInv) running+=(r.amount||0); else running-=(r.amount||0);
              const pay=isInv?addDays(eom(new Date(r.date)),selSup.paymentTerms||30):null;
              const late=pay&&pay<today;
              return `<tr>
                <td style="font-size:12px;color:var(--mu2);white-space:nowrap">${fmtD(r.sortDate)}</td>
                <td><span class="tag ${isInv?'t-invoice':'t-check'}">${isInv?'חשבונית':'המחאה'}</span></td>
                <td style="font-size:12px">${isInv?(r.invoiceNumber||'—'):(r.checkNumber||'—')}${isInv&&pay?`<div style="font-size:10px;color:${late?'var(--err)':'var(--mu2)'}">לתשלום: ${fmtD(pay)}${late?' ⚠':''}</div>`:''}</td>
                <td class="mono" style="color:var(--warn);font-weight:${isInv?700:400}">${isInv?fmt(r.amount):'—'}</td>
                <td class="mono" style="color:var(--ok);font-weight:${!isInv?700:400}">${!isInv?fmt(r.amount):'—'}</td>
                <td class="mono" style="font-weight:700;color:${running>0?'var(--err)':'var(--ok)'}">${fmt(running)}</td>
              </tr>`;
            }).join('')}
            ${allRows.length===0?'<tr><td colspan="6" class="empty">אין נתונים</td></tr>':''}
          </tbody>
        </table>
      </div>`;
  }

  pg.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
      <h1>גיול חובות ספקים</h1>
      <button class="bg" style="font-size:12px;padding:6px 13px" onclick="printAgingSummary()">🖨 הדפס סיכום</button>
    </div>
    <div class="sub-title">ניתוח חשבוניות פתוחות לפי גיל</div>
    <div class="g4" style="margin-bottom:18px">
      ${Object.entries(blabels).map(([k,l])=>`<div class="card" style="padding:14px 16px"><div style="font-size:11px;color:var(--mu2);margin-bottom:5px">${l}</div><div class="mono" style="font-size:15px;font-weight:700;color:${bc[k]}">${fmt(totals[k])}</div></div>`).join('')}
    </div>

    ${summaryRows.length>0?`<div class="card" style="overflow:hidden;margin-bottom:18px" id="aging-summary-wrap">
      <table>
        <thead><tr><th>ספק</th>${Object.entries(blabels).map(([k,l])=>`<th style="color:${bc[k]}">${l}</th>`).join('')}<th>סה"כ פתוח</th><th>כרטסת</th></tr></thead>
        <tbody>
          ${summaryRows.map(({sup,bkts,total})=>`<tr>
            <td style="font-weight:700">${sup.name}</td>
            ${Object.entries(bkts).map(([k,v])=>`<td class="mono" style="color:${v>0?bc[k]:'var(--mu)'};font-weight:${v>0?700:400}">${v>0?fmt(v):'—'}</td>`).join('')}
            <td class="mono" style="font-weight:800;color:var(--err)">${fmt(total)}</td>
            <td><button class="bg" style="padding:2px 8px;font-size:11px" onclick="agingSup='${sup.id}';renderAging()">הצג</button></td>
          </tr>`).join('')}
          <tr style="border-top:2px solid var(--bd)">
            <td style="font-weight:700;color:var(--mu2)">סה"כ</td>
            ${['0-30','31-60','61-90','90+'].map(k=>`<td class="mono" style="font-weight:700;color:${bc[k]}">${fmt(totals[k])}</td>`).join('')}
            <td class="mono" style="font-weight:800;color:var(--err);font-size:15px">${fmt(totals.all)}</td>
            <td></td>
          </tr>
        </tbody>
      </table>
    </div>`:`<div class="empty" style="color:var(--ok)">✅ אין חשבוניות פתוחות</div>`}

    ${selSup?`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:13px;color:var(--mu2)">כרטסת מפורטת:</span>
      <select style="max-width:220px" onchange="agingSup=this.value;renderAging()">
        <option value="all">— בחר ספק —</option>
        ${summaryRows.map(r=>`<option value="${r.sup.id}"${r.sup.id===agingSup?' selected':''}>${r.sup.name}</option>`).join('')}
      </select>
      <button class="bg" style="font-size:12px;padding:5px 10px" onclick="agingSup='all';renderAging()">✕ סגור</button>
    </div>${ledgerHtml}`:''}
  `;
}

}

let importMsg='', importPreview=null, importMap={};
function renderImport(){
  const pg=el('page-import');
  pg.innerHTML=`
    <h1>יבוא נתונים מאקסל</h1><div class="sub-title">העלה קבצי Excel — האפליקציה מזהה עמודות אוטומטית</div>
    ${importMsg?`<div class="success-msg">${importMsg}</div>`:''}
    ${!importPreview?`
    <div class="g2" style="margin-bottom:20px">
      <div class="drop-zone" id="dz-checks" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="dzDrop(event,'checks')">
        <div class="dz-icon">📄</div><div class="dz-title">ייבוא המחאות</div><div class="dz-sub">גרור קובץ xlsx לכאן</div>
        <label style="cursor:pointer"><span style="background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--gold)">בחר קובץ</span><input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="fileImport(this,'checks')"></label>
      </div>
      <div class="drop-zone" id="dz-inv" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="dzDrop(event,'invoices')">
        <div class="dz-icon">🧾</div><div class="dz-title">ייבוא חשבוניות</div><div class="dz-sub">גרור קובץ xlsx לכאן</div>
        <label style="cursor:pointer"><span style="background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--gold)">בחר קובץ</span><input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="fileImport(this,'invoices')"></label>
      </div>
    </div>`:`
    <div class="card" style="padding:20px;margin-bottom:18px">
      <div style="font-size:14px;font-weight:700;margin-bottom:4px">${importPreview.type==='checks'?'תצוגה מקדימה — המחאות':'תצוגה מקדימה — חשבוניות'}</div>
      <div style="font-size:12px;color:var(--mu2);margin-bottom:16px">${importPreview.rows.length} שורות זוהו</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;margin-bottom:16px" id="map-fields"></div>
      <div style="overflow-x:auto;margin-bottom:16px"><table style="min-width:420px" id="preview-tbl"></table></div>
      <div style="display:flex;gap:8px">
        <button class="bp" onclick="doImport()">ייבא ${importPreview.rows.length} ${importPreview.type==='checks'?'המחאות':'חשבוניות'}</button>
        <button class="bg" onclick="importPreview=null;renderImport()">ביטול</button>
      </div>
    </div>`}
    <div class="g2">
      <div class="card" style="padding:14px 16px">
        <div style="font-size:12px;color:var(--mu2);margin-bottom:6px">📄 המחאות מיובאות</div>
        <div class="mono" style="font-size:18px;font-weight:700;color:var(--inf)">${S.checks.length}</div>
        <div style="font-size:12px;color:var(--mu2);margin-top:3px">סה"כ: ${fmt(S.checks.reduce((s,c)=>s+(c.amount||0),0))}</div>
        ${S.checks.length>0?`<button class="bd" style="margin-top:10px;font-size:12px;padding:3px 9px" onclick="if(confirm('למחוק את כל ההמחאות?')){S.checks=[];save();renderImport();}">נקה הכל</button>`:''}
      </div>
      <div class="card" style="padding:14px 16px">
        <div style="font-size:12px;color:var(--mu2);margin-bottom:6px">🧾 חשבוניות מיובאות</div>
        <div class="mono" style="font-size:18px;font-weight:700;color:var(--warn)">${S.invoices.length}</div>
        <div style="font-size:12px;color:var(--mu2);margin-top:3px">סה"כ: ${fmt(S.invoices.reduce((s,i)=>s+(i.amount||0),0))}</div>
        ${S.invoices.length>0?`<button class="bd" style="margin-top:10px;font-size:12px;padding:3px 9px" onclick="if(confirm('למחוק את כל החשבוניות?')){S.invoices=[];save();renderImport();}">נקה הכל</button>`:''}
      </div>
    </div>
  `;
  if(importPreview) renderMapFields();
}

function detect(cols,...cands){for(const c of cands){const f=cols.find(col=>col.toLowerCase().includes(c));if(f)return f;}return cols[0]||'';}
function dzDrop(e,type){e.preventDefault();e.currentTarget.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)parseXL(f,type);}
function fileImport(input,type){if(input.files[0])parseXL(input.files[0],type);}
function parseXL(file,type){
  const r=new FileReader();
  r.onload=e=>{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:true});
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
    const cols=rows.length?Object.keys(rows[0]):[];
    importMap=type==='checks'
      ?{supplierName:detect(cols,'ספק','שם','supplier','name'),date:detect(cols,'תאריך','date'),amount:detect(cols,'סכום','amount','סה'),checkNumber:detect(cols,'המחאה','check','מספר','num')}
      :{supplierName:detect(cols,'ספק','שם','supplier','name'),date:detect(cols,'תאריך','date'),amount:detect(cols,'סכום','amount','סה'),invoiceNumber:detect(cols,'חשבונית','invoice','מספר','num')};
    importPreview={type,rows,cols};importMsg='';renderImport();
  };
  r.readAsArrayBuffer(file);
}
function renderMapFields(){
  const fLabels={supplierName:'שם ספק',date:'תאריך',amount:'סכום',checkNumber:"מס' המחאה",invoiceNumber:"מס' חשבונית"};
  const cont=el('map-fields');
  if(!cont)return;
  cont.innerHTML=Object.entries(importMap).map(([field,col])=>`
    <div><label>${fLabels[field]||field}</label>
    <select onchange="importMap['${field}']=this.value;renderPreviewTable()">
      ${importPreview.cols.map(c=>`<option${c===col?' selected':''}>${c}</option>`).join('')}
    </select></div>`).join('');
  renderPreviewTable();
}
function renderPreviewTable(){
  const tbl=el('preview-tbl');if(!tbl)return;
  const parse=v=>parseFloat(String(v).replace(/[^0-9.-]/g,''))||0;
  tbl.innerHTML=`<thead><tr><th>שם ספק</th><th>תאריך</th><th>סכום</th><th>${importPreview.type==='checks'?"מס' המחאה":"מס' חשבונית"}</th></tr></thead>
  <tbody>${importPreview.rows.slice(0,5).map(r=>{
    const name=String(r[importMap.supplierName]||'').trim();
    const amt=parse(r[importMap.amount]);
    const num=String(r[importPreview.type==='checks'?importMap.checkNumber:importMap.invoiceNumber]||'');
    return`<tr><td>${name||'<span style="color:var(--err)">חסר</span>'}</td><td style="font-size:12px;color:var(--mu2)">${fmtD(xlDate(r[importMap.date]))}</td><td class="mono" style="color:${amt?'var(--warn)':'var(--err)'}">${amt?fmt(amt):'חסר'}</td><td style="font-size:12px;color:var(--mu2)">${num||'—'}</td></tr>`;
  }).join('')}</tbody>`;
}
function doImport(){
  if(!importPreview)return;
  const {type,rows}=importPreview;
  const allSups=[...S.suppliers];
  const getOrCreate=name=>{let s=allSups.find(x=>x.name===name);if(!s){s={id:uid(),name,paymentTerms:30,paymentMethod:'המחאה',notes:''};allSups.push(s);}return s;};
  const parse=v=>parseFloat(String(v).replace(/[^0-9.-]/g,''))||0;
  const prevLen=allSups.length;
  if(type==='checks'){
    const items=rows.map(r=>{const name=String(r[importMap.supplierName]||'').trim();if(!name)return null;const sup=getOrCreate(name);const amt=parse(r[importMap.amount]);if(!amt)return null;return{id:uid(),supplierName:name,supplierId:sup.id,date:xlDate(r[importMap.date]),amount:amt,checkNumber:String(r[importMap.checkNumber]||'')};}).filter(Boolean);
    S.checks.push(...items);S.suppliers=allSups;save();
    importMsg=`✅ יובאו ${items.length} המחאות${allSups.length>prevLen?` | ${allSups.length-prevLen} ספקים חדשים`:''}`;
  }else{
    const items=rows.map(r=>{const name=String(r[importMap.supplierName]||'').trim();if(!name)return null;const sup=getOrCreate(name);const amt=parse(r[importMap.amount]);if(!amt)return null;return{id:uid(),supplierName:name,supplierId:sup.id,date:xlDate(r[importMap.date]),amount:amt,invoiceNumber:String(r[importMap.invoiceNumber]||'')};}).filter(Boolean);
    S.invoices.push(...items);S.suppliers=allSups;save();
    importMsg=`✅ יובאו ${items.length} חשבוניות${allSups.length>prevLen?` | ${allSups.length-prevLen} ספקים חדשים`:''}`;
  }
  importPreview=null;renderImport();renderSidebar();
}

// RECURRING
// ═══════════════════════════════════════════════════════════════
let recEditId=null;
function renderRecurring(){
  const pg=el('page-recurring');
  const expenses=S.fixedItems.filter(f=>f.type==='expense');
  const incomes=S.fixedItems.filter(f=>f.type==='income');
  pg.innerHTML=`
    <h1>הכנסות והוצאות קבועות</h1><div class="sub-title">פריטים חוזרים חודשיים או חד-פעמיים</div>
    <div class="card" style="padding:18px;margin-bottom:18px">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px">${recEditId?'✏ עריכה':'➕ הוסף פריט'}</div>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:11px;margin-bottom:11px">
        <div><label>שם</label><input id="rf-name" placeholder="שם ההוצאה/הכנסה"></div>
        <div><label>סכום (₪)</label><input id="rf-amount" type="number" placeholder="0"></div>
        <div><label>סוג</label><select id="rf-type"><option value="expense">הוצאה</option><option value="income">הכנסה</option></select></div>
        <div><label>תדירות</label><select id="rf-rec" onchange="renderRecurring()"><option value="monthly">חודשי</option><option value="once">חד-פעמי</option></select></div>
        <div id="rf-day-wrap"><label>יום בחודש</label><input id="rf-day" type="number" min="1" max="28" value="1"></div>
      </div>
      <div style="display:flex;gap:7px">
        <button class="bp" onclick="saveRec()">${recEditId?'עדכן':'הוסף'}</button>
        ${recEditId?'<button class="bg" onclick="recEditId=null;renderRecurring()">ביטול</button>':''}
      </div>
    </div>
    <div class="g2" style="margin-bottom:16px">
      <div class="card" style="padding:13px 16px"><div style="font-size:11px;color:var(--mu2);margin-bottom:3px">סה"כ הוצאות / חודש</div><div class="mono" style="font-size:17px;font-weight:700;color:var(--err)">${fmt(expenses.reduce((s,f)=>s+(f.amount||0),0))}</div></div>
      <div class="card" style="padding:13px 16px"><div style="font-size:11px;color:var(--mu2);margin-bottom:3px">סה"כ הכנסות / חודש</div><div class="mono" style="font-size:17px;font-weight:700;color:var(--ok)">${fmt(incomes.reduce((s,f)=>s+(f.amount||0),0))}</div></div>
    </div>
    ${[['🔴 הוצאות קבועות',expenses,'var(--err)'],['🟢 הכנסות קבועות',incomes,'var(--ok)']].map(([title,items,col])=>`
    <div class="card" style="overflow:hidden;margin-bottom:13px">
      <div class="section-title">${title}</div>
      <table><thead><tr><th>שם</th><th>סכום</th><th>תדירות</th><th>יום / תאריך</th><th>פעולות</th></tr></thead><tbody>
        ${items.map(fi=>`<tr>
          <td style="font-weight:600">${fi.name}</td>
          <td class="mono" style="color:${col};font-weight:700">${fmt(fi.amount)}</td>
          <td style="font-size:12px;color:var(--mu2)">${fi.recurrence==='monthly'?'חודשי':'חד-פעמי'}</td>
          <td style="font-size:12px;color:var(--mu2)">${fi.recurrence==='monthly'?`יום ${fi.dayOfMonth}`:fmtD(fi.date)}</td>
          <td><div style="display:flex;gap:5px">
            <button class="bg" style="padding:3px 8px;font-size:11px" onclick="editRec('${fi.id}')">עריכה</button>
            <button class="bd" style="padding:3px 8px;font-size:11px" onclick="if(confirm('למחוק?')){S.fixedItems=S.fixedItems.filter(x=>x.id!=='${fi.id}');save();renderRecurring();}">מחק</button>
          </div></td>
        </tr>`).join('')}
        ${items.length===0?'<tr><td colspan="5" class="empty">אין פריטים</td></tr>':''}
      </tbody></table>
    </div>`).join('')}
  `;
  if(recEditId){
    const fi=S.fixedItems.find(x=>x.id===recEditId);
    if(fi){
      el('rf-name').value=fi.name||'';el('rf-amount').value=fi.amount||'';
      el('rf-type').value=fi.type||'expense';el('rf-rec').value=fi.recurrence||'monthly';
      if(fi.recurrence==='once'){el('rf-day-wrap').innerHTML='<label>תאריך</label><input id="rf-day" type="date">';el('rf-day').value=fi.date||'';}
      else el('rf-day').value=fi.dayOfMonth||1;
    }
  }
  el('rf-rec').addEventListener('change',function(){
    const w=el('rf-day-wrap');
    if(this.value==='once'){w.innerHTML='<label>תאריך</label><input id="rf-day" type="date">';}
    else{w.innerHTML='<label>יום בחודש</label><input id="rf-day" type="number" min="1" max="28" value="1">';}
  });
}
function saveRec(){
  const name=el('rf-name').value.trim();const amount=parseFloat(el('rf-amount').value)||0;
  if(!name||!amount)return;
  const rec=el('rf-rec').value;
  const item={name,amount,type:el('rf-type').value,recurrence:rec,id:recEditId||uid()};
  if(rec==='monthly')item.dayOfMonth=parseInt(el('rf-day').value)||1;
  else item.date=el('rf-day').value||'';
  if(recEditId)S.fixedItems=S.fixedItems.map(x=>x.id===recEditId?item:x);
  else S.fixedItems.push(item);
  recEditId=null;save();renderRecurring();renderSidebar();
}
function editRec(id){recEditId=id;renderRecurring();}
