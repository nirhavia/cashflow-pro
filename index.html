<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CashFlow Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080d14;--s1:#0f1622;--s2:#141e2e;--bd:#1e2d42;--bd2:#263650;
  --gold:#d4a853;--gold2:#e8c077;--glow:rgba(212,168,83,.15);
  --tx:#c8ddf0;--mu:#4e6a8a;--mu2:#6b87a8;
  --ok:#26b887;--err:#e05454;--warn:#d4a030;--inf:#4d96e8;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{font-family:'Heebo',sans-serif;direction:rtl;color:var(--tx);font-size:14px}
.mono{font-family:'JetBrains Mono',monospace}
input,select,textarea{background:var(--s1);color:var(--tx);border:1px solid var(--bd);border-radius:9px;padding:8px 12px;font-family:'Heebo',sans-serif;font-size:14px;width:100%;outline:none;transition:border-color .2s}
input:focus,select:focus{border-color:var(--gold)}
button{cursor:pointer;border:none;border-radius:9px;padding:7px 15px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;transition:all .15s}
.bp{background:var(--gold);color:#080d14}.bp:hover{background:var(--gold2)}
.bg{background:transparent;color:var(--tx);border:1px solid var(--bd)}.bg:hover{border-color:var(--gold);color:var(--gold)}
.bd{background:transparent;color:var(--err);border:1px solid rgba(224,84,84,.3)}.bd:hover{background:var(--err);color:#fff}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:8px 13px;color:var(--mu2);font-size:11px;font-weight:600;letter-spacing:.5px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 13px;border-bottom:1px solid rgba(30,45,66,.6);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(212,168,83,.03)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:13px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.t-check{background:rgba(77,150,232,.15);color:var(--inf)}
.t-invoice{background:rgba(212,160,48,.15);color:var(--warn)}
.t-income{background:rgba(38,184,135,.15);color:var(--ok)}
.t-fixed{background:rgba(224,84,84,.15);color:var(--err)}
label{font-size:12px;color:var(--mu2);display:block;margin-bottom:4px;font-weight:500}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}
#app{display:flex;height:100vh}
#sidebar{width:215px;background:#05090f;border-left:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
#sidebar-logo{padding:18px 15px 15px;border-bottom:1px solid var(--bd)}
#sidebar-logo .lsub{font-size:9px;color:var(--mu);letter-spacing:3px;margin-bottom:3px}
#sidebar-logo .lname{font-size:18px;font-weight:900;color:var(--gold)}
#sidebar-nav{flex:1;padding:8px 6px;display:flex;flex-direction:column;gap:2px;overflow:auto}
.nav-btn{background:transparent;color:var(--mu2);border:none;border-radius:8px;padding:8px 11px;text-align:right;font-size:13px;font-weight:400;display:flex;align-items:center;gap:8px;cursor:pointer;border-right:2px solid transparent;transition:all .15s;width:100%}
.nav-btn.active{background:var(--glow);color:var(--gold);font-weight:700;border-right-color:var(--gold)}
.nav-btn:hover:not(.active){color:var(--tx)}
#sidebar-footer{padding:10px 10px 14px;display:flex;flex-direction:column;gap:7px}
.alert-box{padding:8px 11px;background:rgba(224,84,84,.07);border:1px solid rgba(224,84,84,.2);border-radius:8px;font-size:11px;color:var(--err);font-weight:700}
.balance-box{padding:8px 11px;background:var(--glow);border:1px solid rgba(212,168,83,.15);border-radius:8px}
.balance-box .lbl{font-size:10px;color:var(--mu);margin-bottom:2px}
#main{flex:1;overflow:auto;padding:24px 28px}
.page{display:none}.page.active{display:block}
h1{font-size:21px;font-weight:800;margin-bottom:3px}
.sub-title{color:var(--mu2);font-size:13px;margin-bottom:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.kpi{padding:16px 18px}
.kpi .icon{font-size:22px;margin-bottom:8px}
.kpi .val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;margin-bottom:4px}
.kpi .lbl{font-size:12px;color:var(--mu2)}
.kpi .note{font-size:10px;color:rgba(212,168,83,.4);margin-top:3px}
.kpi:hover{border-color:var(--gold)}
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal-box{background:var(--s1);border:1px solid var(--bd);border-radius:14px;width:460px;padding:26px;box-shadow:0 24px 64px rgba(0,0,0,.6);max-height:90vh;overflow:auto}
#modal-title{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.chart-wrap{position:relative;height:230px}
.chart-wrap-lg{position:relative;height:320px}
.drop-zone{border:2px dashed var(--bd2);border-radius:11px;padding:32px 20px;text-align:center;transition:border-color .2s;cursor:pointer}
.drop-zone:hover,.drop-zone.drag{border-color:var(--gold)}
.section-title{font-size:14px;font-weight:700;padding:12px 16px;border-bottom:1px solid var(--bd)}
.empty{text-align:center;color:var(--mu2);padding:48px;font-size:14px}
.success-msg{background:rgba(38,184,135,.07);border:1px solid rgba(38,184,135,.25);border-radius:9px;padding:11px 16px;color:var(--ok);font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div id="sidebar-logo">
      <div class="lsub">ניהול תזרים מזומנים</div>
      <div class="lname">CashFlow Pro</div>
    </div>
    <div id="sidebar-nav"></div>
    <div id="sidebar-footer">
      <div id="alert-area"></div>
      <div class="balance-box">
        <div class="lbl">יתרה נוכחית</div>
        <div class="mono" id="sidebar-balance" style="font-size:13px;font-weight:700"></div>
      </div>
    </div>
  </nav>
  <main id="main">
    <div id="page-dashboard" class="page"></div>
    <div id="page-forecast"  class="page"></div>
    <div id="page-suppliers" class="page"></div>
    <div id="page-ledger"    class="page"></div>
    <div id="page-aging"     class="page"></div>
    <div id="page-import"    class="page"></div>
    <div id="page-recurring" class="page"></div>
  </main>
</div>
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-title">
      <span id="modal-title-text"></span>
      <button class="bg" style="padding:3px 9px;font-size:15px" onclick="closeModal()">x</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
var S = {
  suppliers:  JSON.parse(localStorage.getItem('cf-sup')  || '[]'),
  checks:     JSON.parse(localStorage.getItem('cf-chk')  || '[]'),
  invoices:   JSON.parse(localStorage.getItem('cf-inv')  || '[]'),
  fixedItems: JSON.parse(localStorage.getItem('cf-fix')  || '[]'),
  openingBal: parseFloat(localStorage.getItem('cf-ob')   || '0'),
  activeTab:  'dashboard',
  ledgerSup:  null,
  agingSup:   'all'
};
function clearAllImported() {
  if (confirm('למחוק את כל ההמחאות והחשבוניות המיובאות?')) {
    S.checks = []; S.invoices = []; save(); renderImport(); renderSidebar();
  }
}
function save() {
  localStorage.setItem('cf-sup', JSON.stringify(S.suppliers));
  localStorage.setItem('cf-chk', JSON.stringify(S.checks));
  localStorage.setItem('cf-inv', JSON.stringify(S.invoices));
  localStorage.setItem('cf-fix', JSON.stringify(S.fixedItems));
  localStorage.setItem('cf-ob',  S.openingBal);
}
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
function el(id) { return document.getElementById(id); }

// ── Utils ─────────────────────────────────────────────────────────────────────
function fmt(n) {
  return new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);
}
function fmtD(d) {
  return d ? new Date(d).toLocaleDateString('he-IL',{day:'2-digit',month:'2-digit',year:'numeric'}) : '—';
}
function toISO(d) {
  if (!d) return '';
  var dt = d instanceof Date ? d : new Date(d);
  return isNaN(dt) ? '' : dt.toISOString().split('T')[0];
}
function addDays(d, n) {
  var r = new Date(d); r.setDate(r.getDate() + n); return r;
}
function eom(d) {
  var dt = new Date(d); return new Date(dt.getFullYear(), dt.getMonth()+1, 0);
}
function xlDate(v) {
  if (!v && v !== 0) return '';
  if (v instanceof Date) return toISO(v);
  if (typeof v === 'number') {
    if (v > 1) return toISO(new Date(Math.round((v-25569)*86400000)));
    return '';
  }
  if (typeof v === 'string') {
    var s = v.trim();
    if (!s) return '';
    // ISO YYYY-MM-DD (XLSX.js with dateNF returns this for date cells)
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
      var iso = new Date(s + 'T12:00:00');
      if (!isNaN(iso) && iso.getFullYear() > 1900) return toISO(iso);
    }
    // ישראלי DD/M/YY
    var ilMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
    if (ilMatch) {
      var day = parseInt(ilMatch[1], 10);
      var mon = parseInt(ilMatch[2], 10) - 1;
      var yr  = parseInt(ilMatch[3], 10);
      if (yr < 100) yr += 2000;
      var d = new Date(yr, mon, day);
      if (!isNaN(d) && d.getFullYear() > 1900) return toISO(d);
    }
    var d2 = new Date(s);
    if (!isNaN(d2) && d2.getFullYear() > 1900) return toISO(d2);
  }
  return '';
}
function typeLabel(t) {
  return {check:'המחאה',invoice:'חשבונית',income:'הכנסה',fixed:'הוצאה קבועה'}[t] || t;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(title, html) {
  el('modal-title-text').textContent = title;
  el('modal-body').innerHTML = html;
  el('modal-overlay').classList.add('open');
}
function closeModal() { el('modal-overlay').classList.remove('open'); }
el('modal-overlay').addEventListener('click', function(e) {
  if (e.target === el('modal-overlay')) closeModal();
});

// ── Forecast engine ───────────────────────────────────────────────────────────
function buildForecast() {
  var today = new Date(); today.setHours(0,0,0,0);
  var DAYS = 120, events = [];
  S.checks.forEach(function(c) {
    if (!c.date) return;
    var d = new Date(c.date); d.setHours(0,0,0,0);
    if (d >= today) events.push({date:toISO(d), amount:-Math.abs(c.amount||0), type:'check', label:c.supplierName||'המחאה'});
  });
  S.invoices.forEach(function(inv) {
    if (!inv.date) return;
    var sup = S.suppliers.find(function(s){return s.id===inv.supplierId||s.name===inv.supplierName;});
    var terms = sup ? (sup.paymentTerms||30) : 30;
    var pay = addDays(eom(new Date(inv.date)), terms);
    if (pay >= today) events.push({date:toISO(pay), amount:-Math.abs(inv.amount||0), type:'invoice', label:inv.supplierName||'חשבונית'});
  });
  for (var i=0; i<DAYS; i++) {
    var d = addDays(today, i);
    S.fixedItems.forEach(function(fi) {
      var sign = fi.type==='income' ? 1 : -1;
      if (fi.recurrence==='monthly' && d.getDate()===(fi.dayOfMonth||1))
        events.push({date:toISO(d), amount:sign*Math.abs(fi.amount||0), type:fi.type==='income'?'income':'fixed', label:fi.name});
      else if (fi.recurrence==='once' && toISO(d)===fi.date)
        events.push({date:toISO(d), amount:sign*Math.abs(fi.amount||0), type:fi.type==='income'?'income':'fixed', label:fi.name});
    });
  }
  events.sort(function(a,b){return a.date.localeCompare(b.date);});
  var bal = S.openingBal, chartData = [];
  for (var j=0; j<DAYS; j++) {
    var dd = addDays(today, j), key = toISO(dd);
    events.filter(function(e){return e.date===key;}).forEach(function(e){bal+=e.amount;});
    chartData.push({date:key, balance:Math.round(bal), label:dd.toLocaleDateString('he-IL',{day:'numeric',month:'short'})});
  }
  var negDays = chartData.filter(function(c){return c.balance<0;}).map(function(c){return c.date;});
  var minBal = chartData.length ? Math.min.apply(null, chartData.map(function(c){return c.balance;})) : 0;
  return {events:events, chartData:chartData, negDays:negDays, minBal:minBal};
}

// ── Navigation ────────────────────────────────────────────────────────────────
var TABS = [
  {id:'dashboard',icon:'📊',label:'דשבורד'},
  {id:'forecast', icon:'📅',label:'תזרים עתידי'},
  {id:'suppliers',icon:'🏢',label:'ספקים'},
  {id:'ledger',   icon:'📒',label:'כרטסת ספק'},
  {id:'aging',    icon:'⏱', label:'גיול חובות'},
  {id:'import',   icon:'📥',label:'יבוא נתונים'},
  {id:'recurring',icon:'🔄',label:'קבועות'},
];
function renderSidebar() {
  var nav = el('sidebar-nav'); nav.innerHTML = '';
  TABS.forEach(function(t) {
    var btn = document.createElement('button');
    btn.className = 'nav-btn' + (S.activeTab===t.id ? ' active' : '');
    btn.innerHTML = '<span style="font-size:15px">' + t.icon + '</span>' + t.label;
    btn.addEventListener('click', function(){ navigate(t.id); });
    nav.appendChild(btn);
  });
  var fc = buildForecast();
  el('alert-area').innerHTML = fc.negDays.length > 0
    ? '<div class="alert-box">&#9888; ' + fc.negDays.length + ' ימי חוסר צפויים</div>' : '';
  var balEl = el('sidebar-balance');
  balEl.textContent = fmt(S.openingBal);
  balEl.style.color = S.openingBal >= 0 ? 'var(--ok)' : 'var(--err)';
}
function navigate(tabId) {
  S.activeTab = tabId;
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  el('page-' + tabId).classList.add('active');
  renderSidebar();
  var fn = {dashboard:renderDashboard,forecast:renderForecast,suppliers:renderSuppliers,
            ledger:renderLedger,aging:renderAging,import:renderImport,recurring:renderRecurring};
  fn[tabId]();
}

// ── Charts ────────────────────────────────────────────────────────────────────
var charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
var CHART_OPTS = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false}, tooltip:{callbacks:{label:function(c){return fmt(c.raw);}}}},
  scales:{
    x:{grid:{color:'#172030'}, ticks:{color:'#4e6a8a',font:{size:10}}},
    y:{grid:{color:'#172030'}, ticks:{color:'#4e6a8a',font:{size:10}, callback:function(v){return '\u20aa'+(Math.abs(v)/1000).toFixed(0)+'K';}}}
  }
};

// ── Dashboard ─────────────────────────────────────────────────────────────────
function renderDashboard() {
  var pg = el('page-dashboard');
  var fc = buildForecast();
  var totalChk = S.checks.reduce(function(s,c){return s+(c.amount||0);},0);
  var totalInv = S.invoices.reduce(function(s,i){return s+(i.amount||0);},0);
  var negList = fc.negDays.slice(0,18).map(function(d){
    return '<span style="background:rgba(224,84,84,.1);color:var(--err);padding:2px 9px;border-radius:999px;font-size:12px">' + fmtD(d) + '</span>';
  }).join('');
  var negSection = fc.negDays.length > 0
    ? '<div style="background:rgba(224,84,84,.04);border:1px solid rgba(224,84,84,.18);border-radius:11px;padding:18px;margin-top:16px"><div style="color:var(--err);font-size:13px;font-weight:700;margin-bottom:10px">&#9888; ימים עם יתרה שלילית</div><div style="display:flex;flex-wrap:wrap;gap:6px">' + negList + (fc.negDays.length>18?'<span style="color:var(--mu2);font-size:12px">+' + (fc.negDays.length-18) + ' נוספים</span>':'') + '</div></div>' : '';
  var alertBadge = fc.negDays.length > 0
    ? '<span class="tag t-fixed">&#9888; ' + fc.negDays.length + ' ימי חוסר</span>' : '';
  var hasData = S.invoices.length > 0 || S.checks.length > 0;
  var monthlyHtml = '';
  if (hasData) {
    monthlyHtml = '<div class="card" style="padding:20px 22px;margin-bottom:16px"><div style="font-size:14px;font-weight:700;margin-bottom:16px">חשבוניות מול תשלומים &mdash; 6 חודשים אחרונים</div><div style="height:170px"><canvas id="chart-monthly"></canvas></div><div style="display:flex;gap:16px;justify-content:center;margin-top:10px"><div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu2)"><div style="width:10px;height:10px;border-radius:2px;background:#d4a030"></div>חשבוניות</div><div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--mu2)"><div style="width:10px;height:10px;border-radius:2px;background:#4d96e8"></div>המחאות</div></div></div>';
  }
  pg.innerHTML =
    '<h1>דשבורד</h1><div class="sub-title">סקירה כללית ותחזית תזרים</div>' +
    '<div class="g3" style="margin-bottom:18px">' +
    kpiCard('💰','יתרה נוכחית',fmt(S.openingBal),S.openingBal>=0?'var(--ok)':'var(--err)','לחץ לעדכון','kpi-bal') +
    kpiCard('🧾','סה"כ חשבוניות',fmt(totalInv),'var(--warn)') +
    kpiCard('📄','סה"כ המחאות',fmt(totalChk),'var(--inf)') +
    kpiCard('⏳','יתרה לתשלום',fmt(Math.max(0,totalInv-totalChk)),'var(--err)') +
    kpiCard(fc.minBal<0?'⚠':'✅','מינימום תחזית 120י',fmt(fc.minBal),fc.minBal<0?'var(--err)':'var(--ok)') +
    kpiCard('🏢','ספקים פעילים',S.suppliers.length,'var(--mu2)') +
    '</div>' +
    '<div class="card" style="padding:20px 22px;margin-bottom:16px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="font-size:14px;font-weight:700">תחזית תזרים &mdash; 120 ימים קדימה</span>' + alertBadge + '</div>' +
    '<div class="chart-wrap"><canvas id="chart-forecast-dash"></canvas></div></div>' +
    monthlyHtml + negSection;

  el('kpi-bal').addEventListener('click', function() {
    openModal('עדכון יתרת בנק',
      '<label>יתרה נוכחית (&#8362;)</label>' +
      '<input type="number" id="bal-input" value="' + S.openingBal + '" style="margin-bottom:14px">' +
      '<div style="display:flex;gap:8px">' +
      '<button class="bp" onclick="S.openingBal=parseFloat(el(\'bal-input\').value)||0;save();closeModal();navigate(\'dashboard\')">שמור</button>' +
      '<button class="bg" onclick="closeModal()">ביטול</button></div>'
    );
  });

  destroyChart('forecast-dash');
  var fcCtx = el('chart-forecast-dash').getContext('2d');
  var every = Math.ceil(fc.chartData.length/12);
  charts['forecast-dash'] = new Chart(fcCtx, {
    type:'line',
    data:{
      labels: fc.chartData.map(function(d,i){return i%every===0?d.label:'';}),
      datasets:[{data:fc.chartData.map(function(d){return d.balance;}),borderColor:'#d4a853',borderWidth:2,pointRadius:0,fill:true,backgroundColor:'rgba(212,168,83,.12)',tension:.4}]
    },
    options: CHART_OPTS
  });

  if (hasData) {
    var now = new Date();
    var months = [];
    for (var m=0; m<6; m++) {
      var md = new Date(now.getFullYear(), now.getMonth()-5+m, 1);
      var mkey = md.getFullYear() + '-' + String(md.getMonth()+1).padStart(2,'0');
      months.push({key:mkey, label:md.toLocaleDateString('he-IL',{month:'short',year:'2-digit'})});
    }
    destroyChart('monthly');
    var mCtx = el('chart-monthly').getContext('2d');
    charts['monthly'] = new Chart(mCtx, {
      type:'bar',
      data:{
        labels: months.map(function(m){return m.label;}),
        datasets:[
          {label:'חשבוניות', data:months.map(function(m){return S.invoices.filter(function(x){return x.date&&x.date.startsWith(m.key);}).reduce(function(s,x){return s+(x.amount||0);},0);}), backgroundColor:'rgba(212,160,48,.85)', borderRadius:3},
          {label:'המחאות',   data:months.map(function(m){return S.checks.filter(function(x){return x.date&&x.date.startsWith(m.key);}).reduce(function(s,x){return s+(x.amount||0);},0);}), backgroundColor:'rgba(77,150,232,.85)',  borderRadius:3}
        ]
      },

    return '<tr>' +

      '<td><span class="tag ' + (isInv?'t-invoice':'t-check') + '">' + (isInv?'חשבונית':'המחאה') + '</span></td>' +
      '<td style="font-size:12px">' + docNum + payInfo + '</td>' +
      '<td class="mono" style="color:var(--warn);font-weight:' + (isInv?700:400) + '">' + (isInv?fmt(r.amount):'—') + '</td>' +

// ── Aging ─────────────────────────────────────────────────────────────────────
function renderAging() {
  var pg = el('page-aging');
  var today = new Date(); today.setHours(0,0,0,0);
  var bc = {'0-30':'var(--ok)','31-60':'var(--warn)','61-90':'var(--err)','90+':'#b91c1c'};
  var bl = {'0-30':'עד 30 יום','31-60':'31–60 יום','61-90':'61–90 יום','90+':'מעל 90 יום'};

  var summaryRows = S.suppliers.map(function(sup) {
    var sInv = S.invoices.filter(function(i){return i.supplierId===sup.id||i.supplierName===sup.name;});
    var pool = S.checks.filter(function(c){return c.supplierId===sup.id||c.supplierName===sup.name;}).reduce(function(s,c){return s+(c.amount||0);},0);
    var bkts = {'0-30':0,'31-60':0,'61-90':0,'90+':0};
    var sorted = sInv.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});
    sorted.forEach(function(inv) {
      var age = Math.floor((today - new Date(inv.date)) / 86400000);
      var amt = inv.amount||0, cov = Math.min(pool, amt); pool -= cov;
      var open = amt - cov; if (open <= 0) return;
      if (age<=30) bkts['0-30']+=open; else if (age<=60) bkts['31-60']+=open; else if (age<=90) bkts['61-90']+=open; else bkts['90+']+=open;
    });
    var total = Object.keys(bkts).reduce(function(s,k){return s+bkts[k];},0);
    return {sup:sup, bkts:bkts, total:total};
  }).filter(function(r){return r.total>0;});

  var totals = {'0-30':0,'31-60':0,'61-90':0,'90+':0, all:0};
  summaryRows.forEach(function(r){ Object.keys(r.bkts).forEach(function(k){totals[k]+=r.bkts[k];}); totals.all+=r.total; });

  var summTbl = '';
  if (summaryRows.length > 0) {
    var hdrs = Object.keys(bl).map(function(k){return '<th style="color:'+bc[k]+'">'+bl[k]+'</th>';}).join('');
    var sRows = summaryRows.map(function(r) {
      var cells = Object.keys(r.bkts).map(function(k){return '<td class="mono" style="color:'+(r.bkts[k]>0?bc[k]:'var(--mu)')+';font-weight:'+(r.bkts[k]>0?700:400)+'">'+(r.bkts[k]>0?fmt(r.bkts[k]):'—')+'</td>';}).join('');
      return '<tr><td style="font-weight:700">'+r.sup.name+'</td>'+cells+'<td class="mono" style="font-weight:800;color:var(--err)">'+fmt(r.total)+'</td><td><button class="bg" style="padding:2px 8px;font-size:11px" onclick="S.agingSup=\''+r.sup.id+'\';renderAging()">הצג כרטסת</button></td></tr>';
    }).join('');
    var totRow = '<tr style="border-top:2px solid var(--bd)"><td style="font-weight:700;color:var(--mu2)">סה"כ</td>' + Object.keys(totals).filter(function(k){return k!=='all';}).map(function(k){return '<td class="mono" style="font-weight:700;color:'+bc[k]+'">'+fmt(totals[k])+'</td>';}).join('') + '<td class="mono" style="font-weight:800;color:var(--err);font-size:15px">'+fmt(totals.all)+'</td><td></td></tr>';

function dropZone(label, type) {
  return '<div class="drop-zone" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="dzDrop(event,\''+type+'\')">' +
    '<div style="font-size:30px;margin-bottom:8px">' + (type==='checks'?'📄':'🧾') + '</div>' +
    '<div style="font-size:14px;font-weight:600;margin-bottom:5px">ייבוא ' + label + '</div>' +
    '<div style="font-size:12px;color:var(--mu2);margin-bottom:12px">גרור קובץ xlsx לכאן</div>' +
    '<label style="cursor:pointer"><span style="background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--gold)">בחר קובץ</span>' +
    '<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="fileImport(this,\''+type+'\')"></label></div>';
}
function detect(cols) {
  var cands = Array.prototype.slice.call(arguments, 1);
  for (var i=0; i<cands.length; i++) {
    var f = cols.find(function(col){return col.toLowerCase().includes(cands[i]);});
    if (f) return f;
  }
  return ''; // אל תחזור לעמודה ראשונה אם לא נמצא התאם
}
function dzDrop(e, type) { e.preventDefault(); e.currentTarget.classList.remove('drag'); var f = e.dataTransfer.files[0]; if (f) parseXL(f, type); }
function fileImport(input, type) { if (input.files[0]) parseXL(input.files[0], type); }
function parseXL(file, type) {
  var r = new FileReader();
  r.onload = function(e) {
    var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true, dateNF:'yyyy-mm-dd'});
    var rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:'', raw:false, dateNF:'yyyy-mm-dd'});
    var cols = rows.length ? Object.keys(rows[0]) : [];
    importMap = type==='checks'
      ? {supplierName:detect(cols,'מוטב','ספק','שם','supplier','name'), date:detect(cols,'פרעון','ת. פ','תאריך','date'), amount:detect(cols,'סכום','amount'), checkNumber:detect(cols,'המחאה','check','מספר','num')}
      : {supplierName:detect(cols,'ספק','שם','supplier','name'), date:detect(cols,'תאריך','date','פרעון'), amount:detect(cols,'סכום','amount'), invoiceNumber:detect(cols,'חשבונית','invoice','מספר','num')};
    importPreview = {type:type, rows:rows, cols:cols};
    importMsg = '';
    renderImport();
  };
  r.readAsArrayBuffer(file);
}
function renderImportPreview() {
  var wrap = el('preview-tbl-wrap'); if (!wrap) return;
  var parse = function(v){return parseFloat(String(v).replace(/[^0-9.-]/g,''))||0;};
  var numKey = importPreview.type==='checks' ? importMap.checkNumber : importMap.invoiceNumber;
  var rows = importPreview.rows.slice(0,5).map(function(r) {
    var name = String(r[importMap.supplierName]||'').trim();
    var amt = parse(r[importMap.amount]);
    var num = String(r[numKey]||'');
    return '<tr><td>'+(name||'<span style="color:var(--err)">חסר</span>')+'</td><td style="font-size:12px;color:var(--mu2)">'+fmtD(xlDate(r[importMap.date]))+'</td><td class="mono" style="color:'+(amt?'var(--warn)':'var(--err)')+'">'+(amt?fmt(amt):'חסר')+'</td><td style="font-size:12px;color:var(--mu2)">'+(num||'—')+'</td></tr>';
  }).join('');
  wrap.innerHTML = '<table style="min-width:420px"><thead><tr><th>שם ספק</th><th>תאריך</th><th>סכום</th><th>'+(importPreview.type==='checks'?"מס' המחאה":"מס' חשבונית")+'</th></tr></thead><tbody>'+rows+'</tbody></table>';
}
function doImport() {
  if (!importPreview) return;
  var type = importPreview.type, rows = importPreview.rows;
  var allSups = S.suppliers.slice();
  function getOrCreate(name) {
    var s = allSups.find(function(x){return x.name===name;});
    if (!s) { s = {id:uid(),name:name,paymentTerms:30,paymentMethod:'המחאה',notes:''}; allSups.push(s); }
    return s;
  }
  var parse = function(v){return parseFloat(String(v).replace(/[^0-9.-]/g,''))||0;};
  var prevLen = allSups.length;
  if (type==='checks') {
    var items = rows.map(function(r){ var name=String(r[importMap.supplierName]||'').trim(); if(!name)return null; var sup=getOrCreate(name); var amt=parse(r[importMap.amount]||0); if(!amt)return null; var chkNum = importMap.checkNumber ? String(r[importMap.checkNumber]||'') : ''; return {id:uid(),supplierName:name,supplierId:sup.id,date:xlDate(r[importMap.date]),amount:amt,checkNumber:chkNum}; }).filter(Boolean);
    S.checks = S.checks.concat(items); S.suppliers = allSups; save();
    importMsg = 'יובאו ' + items.length + ' המחאות' + (allSups.length>prevLen?' | '+( allSups.length-prevLen)+' ספקים חדשים':'');
  } else {
    var items2 = rows.map(function(r){ var name=String(r[importMap.supplierName]||'').trim(); if(!name)return null; var sup=getOrCreate(name); var amt=parse(r[importMap.amount]||0); if(!amt)return null; var invNum = importMap.invoiceNumber ? String(r[importMap.invoiceNumber]||'') : ''; return {id:uid(),supplierName:name,supplierId:sup.id,date:xlDate(r[importMap.date]),amount:amt,invoiceNumber:invNum}; }).filter(Boolean);
    S.invoices = S.invoices.concat(items2); S.suppliers = allSups; save();
    importMsg = 'יובאו ' + items2.length + ' חשבוניות' + (allSups.length>prevLen?' | '+(allSups.length-prevLen)+' ספקים חדשים':'');
  }
  importPreview = null; renderImport(); renderSidebar();
}

function saveRec() {
  var name = el('rf-name').value.trim(), amount = parseFloat(el('rf-amount').value)||0;
  if (!name||!amount) return;
  var rec = el('rf-rec').value;
  var item = {name:name, amount:amount, type:el('rf-type').value, recurrence:rec, id:recEditId||uid()};
  if (rec==='monthly') item.dayOfMonth = parseInt(el('rf-day').value)||1;
  else item.date = el('rf-day').value||'';
  if (recEditId) S.fixedItems = S.fixedItems.map(function(x){return x.id===recEditId?item:x;});
  else S.fixedItems.push(item);
  recEditId = null; save(); renderRecurring(); renderSidebar();
}
function editRec(id) { recEditId = id; renderRecurring(); }
function delRec(id) { S.fixedItems = S.fixedItems.filter(function(x){return x.id!==id;}); save(); renderRecurring(); renderSidebar(); }

// ── Init ──────────────────────────────────────────────────────────────────────
renderSidebar();
navigate('dashboard');
</script>
